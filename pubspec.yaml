name: naub_ai_new
description: NAUB AI - Smart Assistant for Nigerian Army University Biu
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  http: ^1.1.0
  url_launcher: ^6.2.0
  xml: ^6.5.0
  connectivity_plus: ^6.1.0
  flutter_dotenv: ^5.1.0  # ← ADD THIS

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - .env          # ← ADD THIS
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0D47A1"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
